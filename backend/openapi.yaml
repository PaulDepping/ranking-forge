openapi: 3.1.0
info:
  title: RankingForge API
  version: 0.1.0
  description: >
    REST API for RankingForge. Authentication is via HttpOnly session cookies
    set on login. All endpoints except /auth/* require a valid session.

servers:
  - url: http://localhost:3000

components:
  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    User:
      type: object
      required: [id, email, display_name, has_startgg_key, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        has_startgg_key:
          type: boolean
          description: True if the user has a start.gg API key configured
        created_at:
          type: string
          format: date-time

    Project:
      type: object
      required: [id, name, created_at, owner_has_startgg_key]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        game_id:
          type: integer
          nullable: true
        game_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        owner_has_startgg_key:
          type: boolean
          description: True if the project owner has a start.gg API key configured

    Ranking:
      type: object
      required: [id, project_id, name, published, created_at, player_count]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        published:
          type: boolean
          description: When true, guests can view this ranking without an account
        created_at:
          type: string
          format: date-time
        user_role:
          type: string
          nullable: true
          description: The authenticated user's role on this ranking's project (owner/editor/viewer); null for guests
        algorithm:
          type: string
          nullable: true
          description: Algorithm name ("elo", "glicko2", or null for manual)
        algorithm_config:
          type: object
          description: Algorithm-specific configuration (e.g. k_factor for Elo)
        include_external_results:
          type: boolean
          default: false
        result_sort:
          type: string
          default: upset_factor
        player_count:
          type: integer
          minimum: 0
          description: Number of players in this ranking

    RankingPlayer:
      type: object
      required: [player_id, name]
      properties:
        player_id:
          type: string
          format: uuid
        name:
          type: string
        rank_position:
          type: integer
          nullable: true
          description: Manual rank position set by editors; null if not yet ranked
        notes:
          type: string
          nullable: true
          description: Free-text notes about this player in the context of this ranking

    Player:
      type: object
      required: [id, project_id, name, created_at, accounts]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/StartggAccount'

    StartggAccount:
      type: object
      required: [id, startgg_user_id, handle]
      properties:
        id:
          type: string
          format: uuid
        startgg_user_id:
          type: integer
        handle:
          type: string
          description: Bare start.gg handle, e.g. "mang0"
        display_name:
          type: string
          nullable: true

    Tournament:
      type: object
      required: [id, name, handle, online, events]
      properties:
        id:
          type: string
          format: uuid
        startgg_id:
          type: integer
        name:
          type: string
        handle:
          type: string
          description: Bare tournament handle, e.g. "genesis-9"
        city:
          type: string
          nullable: true
        addr_state:
          type: string
          nullable: true
        country_code:
          type: string
          nullable: true
        venue_name:
          type: string
          nullable: true
        online:
          type: boolean
        start_at:
          type: string
          format: date-time
          nullable: true
        end_at:
          type: string
          format: date-time
          nullable: true
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProjectEvent'

    ProjectEvent:
      type: object
      required: [id, name, included, bracket_types]
      properties:
        id:
          type: string
          format: uuid
        startgg_id:
          type: integer
        name:
          type: string
        game_name:
          type: string
          nullable: true
        num_entrants:
          type: integer
          nullable: true
        start_at:
          type: string
          format: date-time
          nullable: true
        included:
          type: boolean
        event_type:
          type: integer
          nullable: true
          description: "start.gg event type: 1 = singles/individual, 2 = teams"
        bracket_types:
          type: array
          items:
            type: string
          description: "Bracket types ordered by phase_order (e.g. ROUND_ROBIN, DOUBLE_ELIMINATION)"

    ImportProgress:
      type: object
      required: [phase, step, total]
      properties:
        phase:
          type: string
          enum: [scanning, importing]
          description: Current phase of the import job
        step:
          type: integer
          description: How many units have been completed in this phase
        total:
          type: integer
          description: How many units total in this phase

    ImportStatus:
      type: object
      required: [id, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, done, failed]
        error:
          type: string
          nullable: true
        after_date:
          type: string
          format: date
          nullable: true
          description: Lower bound of the import date filter (inclusive), if set.
        before_date:
          type: string
          format: date
          nullable: true
          description: Upper bound of the import date filter (inclusive), if set.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        progress:
          allOf:
            - $ref: '#/components/schemas/ImportProgress'
          nullable: true
          description: Current progress of the import job; null if pending or no progress written yet

    SetRecord:
      type: object
      required: [opponent_id, opponent_name, upset_factor, winner_score, loser_score, tournament_name, tournament_handle, event_name, round_name, completed_at, is_dq, vod_url, startgg_set_id, winner_seed, loser_seed]
      properties:
        opponent_id:
          type: string
          format: uuid
          nullable: true
          description: >
            UUID of the opponent's player record if they are a member of this ranking;
            null for opponents who are not ranking members.
        opponent_name:
          type: string
        upset_factor:
          type: integer
          description: Upset factor of this individual set (winner's projected round minus loser's)
        winner_score:
          type: integer
          nullable: true
          description: Games won by the winner of this set. Null if scores were not recorded.
        loser_score:
          type: integer
          nullable: true
          description: Games won by the loser of this set. Null if scores were not recorded.
        tournament_name:
          type: string
        tournament_handle:
          type: string
          description: Bare tournament handle, e.g. "genesis-9"
        event_name:
          type: string
        round_name:
          type: string
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        is_dq:
          type: boolean
          description: Always false (DQ sets are filtered out server-side); kept for forward-compat.
        vod_url:
          type: string
          nullable: true
        startgg_set_id:
          type: integer
          format: int64
        winner_seed:
          type: integer
          nullable: true
        loser_seed:
          type: integer
          nullable: true

    PlayerStats:
      type: object
      required: [player_id, name, wins, losses]
      properties:
        player_id:
          type: string
          format: uuid
        name:
          type: string
        wins:
          type: array
          description: Individual wins, sorted by upset_factor descending
          items:
            $ref: '#/components/schemas/SetRecord'
        losses:
          type: array
          description: Individual losses, sorted by upset_factor descending
          items:
            $ref: '#/components/schemas/SetRecord'

    TournamentAttendance:
      type: object
      required: [tournament_name, tournament_slug, event_name]
      properties:
        tournament_name:
          type: string
        tournament_slug:
          type: string
        event_name:
          type: string
        placement:
          type: integer
          nullable: true
        num_entrants:
          type: integer
          nullable: true
        start_at:
          type: string
          format: date-time
          nullable: true
        location:
          type: string
          nullable: true

    HeadToHeadEntry:
      type: object
      required: [player_id, opponent_id, wins, losses]
      properties:
        player_id:
          type: string
          format: uuid
        opponent_id:
          type: string
          format: uuid
        wins:
          type: integer
        losses:
          type: integer

    TournamentEntrant:
      type: object
      required: [startgg_user_id, handle, name]
      properties:
        startgg_user_id:
          type: integer
          format: int64
        handle:
          type: string
          description: Bare start.gg handle, e.g. "mang0"
        name:
          type: string
          description: Player's gamer tag from start.gg

    BulkAddEntry:
      type: object
      required: [name, startgg_user_id, handle]
      properties:
        name:
          type: string
          description: Display name to assign to the player
        startgg_user_id:
          type: integer
          format: int64
        handle:
          type: string
          description: start.gg handle (normalized to bare form)

    BulkAddResult:
      type: object
      required: [name, handle, status]
      properties:
        name:
          type: string
        handle:
          type: string
        status:
          type: string
          enum: [created, skipped]

    ByHandlesResult:
      type: object
      required: [handle, status]
      properties:
        handle:
          type: string
        name:
          type: string
          nullable: true
          description: Gamer tag from start.gg; null if not_found
        status:
          type: string
          enum: [created, skipped, not_found]

    Game:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        display_name:
          type: string
          nullable: true

    RankingPlayerScore:
      type: object
      properties:
        ranking_id:
          type: string
          format: uuid
        player_id:
          type: string
          format: uuid
        computed_rating:
          type: number
        display_data:
          type: object
          description: Algorithm-specific display data (e.g. {"rating": 1543, "rd": 120})
        algorithm_state:
          type: object
          description: Internal algorithm state for incremental updates
        computed_at:
          type: string
          format: date-time

    ComputedRankingPlayer:
      type: object
      properties:
        player_id:
          type: string
          format: uuid
        name:
          type: string
        rank_position:
          type: integer
        notes:
          type: string
          nullable: true
        computed_rating:
          type: number
          nullable: true
        display_data:
          type: object
          nullable: true

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      summary: Create a new user account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, display_name, password]
              properties:
                email:
                  type: string
                  format: email
                display_name:
                  type: string
                  maxLength: 50
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '201':
          description: Account created; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login:
    post:
      summary: Log in and receive a session cookie
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Destroy the current session
      tags: [Auth]
      responses:
        '204':
          description: Logged out

  /auth/me:
    get:
      summary: Get the currently authenticated user
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Projects ────────────────────────────────────────────────────────────────

  /projects:
    get:
      summary: List all ranking projects for the authenticated user
      tags: [Projects]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create a new ranking project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                game_id:
                  type: integer
                  nullable: true
                game_name:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projects/{project_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a project by ID
      tags: [Projects]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete a project
      tags: [Projects]
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Rename a project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Players ─────────────────────────────────────────────────────────────────

  /projects/{project_id}/players:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List all players in a project
      tags: [Players]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Add a player to the project
      tags: [Players]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/players/{player_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Remove a player from the project
      tags: [Players]
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Rename a player
      tags: [Players]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /projects/{project_id}/players/{player_id}/accounts:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Link a start.gg account to a player
      tags: [Players]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle]
              properties:
                handle:
                  type: string
                  description: >
                    start.gg user handle or profile URL. Accepts bare handle (e.g. "mang0"),
                    "user/mang0", or full URL (e.g. "https://start.gg/user/mang0"). The handle
                    is normalized to the bare form before storage.
      responses:
        '201':
          description: Account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartggAccount'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /projects/{project_id}/players/{player_id}/accounts/{account_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Unlink a start.gg account from a player
      tags: [Players]
      responses:
        '204':
          description: Unlinked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/players/{player_id}/tournaments:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get all tournament events a player has attended
      description: >
        Returns every event the player entered (via linked start.gg accounts),
        not restricted to included events or events with tracked opponents.
        Sorted by tournament start date descending.
      tags: [Players]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentAttendance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/players/bulk:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Bulk-add players from tournament entrants
      description: >
        Creates a player + linked start.gg account for each entry. Entries where
        the startgg_user_id is already linked in this project are skipped (status: "skipped").
      tags: [Players]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [players]
              properties:
                players:
                  type: array
                  items:
                    $ref: '#/components/schemas/BulkAddEntry'
      responses:
        '200':
          description: Results for each entry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BulkAddResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/players/by-handles:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Add players by start.gg handles
      description: >
        Resolves each handle against the start.gg API and creates a player + account
        for each one not already in the project. Each result reports "created", "skipped"
        (already exists), or "not_found" (start.gg returned no user).
      tags: [Players]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handles]
              properties:
                handles:
                  type: array
                  items:
                    type: string
                  description: >
                    start.gg handles or profile URLs. Normalized to bare handle form before lookup.
      responses:
        '200':
          description: Results for each handle
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ByHandlesResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # Ranking reorder is now at /projects/{project_id}/rankings/{ranking_id}/ranking — see Rankings section below

  /projects/{project_id}/tournament-entrants:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List start.gg tournament entrants for the project's game
      description: >
        Queries the start.gg API for all entrants in the given tournament who
        competed in an event matching the project's configured game. The project
        must have a game configured. Results are deduplicated by startgg_user_id.
      tags: [Players]
      parameters:
        - name: tournament
          in: query
          required: true
          schema:
            type: string
          description: >
            Tournament handle or URL. Accepts bare handle (e.g. "genesis-9"),
            "tournament/genesis-9", or full URL. Normalized to bare form before lookup.
      responses:
        '200':
          description: List of tournament entrants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentEntrant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Import ──────────────────────────────────────────────────────────────────

  /projects/{project_id}/import:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      summary: Enqueue a tournament import job for this project
      description: >
        Creates a job that the background worker will pick up. The worker queries
        start.gg for all tournaments any of the project's players have entered,
        then stores them in the database.
      tags: [Import]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                after_date:
                  type: string
                  format: date
                  nullable: true
                  description: Only import tournaments on or after this date.
                before_date:
                  type: string
                  format: date
                  nullable: true
                  description: Only import tournaments on or before this date.
      responses:
        '202':
          description: Job enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Project owner has not configured a start.gg API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Get the status of the most recent import job for this project
      tags: [Import]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Tournaments (project-level) ───────────────────────────────────────────────

  /projects/{project_id}/tournaments/{tournament_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: tournament_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    delete:
      summary: Delete a tournament from the project
      description: >
        Removes the tournament and all its events/entrants/sets from this project.
        Requires editor or owner role.
      tags: [Tournaments]
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (viewer role)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Rankings ──────────────────────────────────────────────────────────────────

  /projects/{project_id}/rankings:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List all rankings in a project
      tags: [Rankings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ranking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Create a new ranking in a project
      tags: [Rankings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ranking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a ranking by ID
      tags: [Rankings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ranking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update a ranking's name, description, or published flag
      tags: [Rankings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  nullable: true
                published:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ranking'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      summary: Delete a ranking
      tags: [Rankings]
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Ranking players ───────────────────────────────────────────────────────────

  /projects/{project_id}/rankings/{ranking_id}/players:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List players in a ranking
      tags: [Rankings]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RankingPlayer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Add a project player to a ranking
      tags: [Rankings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player_id]
              properties:
                player_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Player added to ranking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingPlayer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /projects/{project_id}/rankings/{ranking_id}/players/{player_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      summary: Update a ranking player's rank_position or notes
      tags: [Rankings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rank_position:
                  type: integer
                  nullable: true
                notes:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RankingPlayer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Remove a player from a ranking
      tags: [Rankings]
      responses:
        '204':
          description: Removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}/ranking:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get players in computed ranking order
      tags: [Rankings]
      parameters:
        - name: project_id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: ranking_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Players ordered by computed_rating (algorithmic) or rank_position (manual)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComputedRankingPlayer'
        '404':
          description: Not found

    put:
      summary: Reorder all players in a ranking
      description: >
        Replaces the full ranking order for this ranking. The request must include
        every player in the ranking exactly once. Positions are assigned as
        array index + 1.
      tags: [Rankings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player_ids]
              properties:
                player_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Ordered list of all player IDs in the ranking.
      responses:
        '200':
          description: Ranking order updated
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Ranking tournaments / events / stats ──────────────────────────────────────

  /projects/{project_id}/rankings/{ranking_id}/tournaments:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: List tournaments and their events for this ranking
      description: >
        Each event includes an `included` flag showing whether it counts toward
        this ranking's stats. All events default to included after import.
      tags: [Tournaments]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tournament'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}/events:
    put:
      summary: Bulk set event inclusion
      tags: [Rankings]
      security:
        - cookieAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: ranking_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [event_id, included]
                properties:
                  event_id:
                    type: string
                    format: uuid
                  included:
                    type: boolean
      responses:
        '202':
          description: Accepted — compute_ranking job enqueued
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /projects/{project_id}/rankings/{ranking_id}/recompute:
    post:
      summary: Manually trigger ranking recompute
      tags: [Rankings]
      security:
        - cookieAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: ranking_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '202':
          description: Accepted — compute_ranking job enqueued
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # ── Stats ────────────────────────────────────────────────────────────────────

  /projects/{project_id}/rankings/{ranking_id}/stats:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get player stats for a ranking ordered by aggregate upset factor (descending)
      description: >
        Only counts sets from included events where both the winner and loser
        are members of this ranking.
      tags: [Stats]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}/stats/{player_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: player_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get stats for a single player within a ranking
      description: >
        Same semantics as GET /projects/{project_id}/rankings/{ranking_id}/stats
        but scoped to one player. Returns a single PlayerStats object rather than an array.
      tags: [Stats]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}/head-to-head:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get head-to-head set records between all players in a ranking
      tags: [Stats]
      responses:
        '200':
          description: Array of (player, opponent, wins, losses) records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HeadToHeadEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project_id}/rankings/{ranking_id}/head-to-head/{pid_a}/{pid_b}/sets:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ranking_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: pid_a
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: pid_b
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get all sets between two players from pid_a's perspective within a ranking
      tags: [Stats]
      responses:
        '200':
          description: Chronological list of sets, most recent first. `is_win` is true if pid_a won.
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/SetRecord'
                    - type: object
                      required: [is_win]
                      properties:
                        is_win:
                          type: boolean
                          description: True if pid_a won this set
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Games ────────────────────────────────────────────────────────────────────

  /games:
    get:
      summary: Search start.gg video games by name
      description: |
        Proxies a game name search to start.gg using the authenticated user's API key.
        Requires the user to have a start.gg API key configured.
        Returns 422 if no key is set.
      tags: [Games]
      security:
        - cookieAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (proxied to start.gg API)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Account ─────────────────────────────────────────────────────────────────

  /account/profile:
    patch:
      summary: Update profile (display name and/or email)
      tags: [Account]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  maxLength: 50
                email:
                  type: string
                  format: email
      responses:
        '204':
          description: Updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /account/password:
    patch:
      summary: Change password
      tags: [Account]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '204':
          description: Password changed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /account/startgg-key:
    put:
      summary: Save or replace the user's start.gg API key
      description: |
        Validates the key against start.gg before storing it.
        Returns 422 if the key is rejected by start.gg, or 502 if start.gg is unreachable.
      tags: [Account]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  description: Bearer token from https://start.gg/admin/profile/developer
      responses:
        '204':
          description: Key saved
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      summary: Remove the user's start.gg API key
      tags: [Account]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Key removed
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account:
    delete:
      summary: Delete account (cascades owned projects)
      tags: [Account]
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Account deleted; session cleared
        '401':
          $ref: '#/components/responses/Unauthorized'
