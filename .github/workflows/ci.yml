name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run tests
        run: bash test.sh

  build-backend:
    needs: [test, topology]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata for api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pauldepping/ranking-forge/api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Docker metadata for worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pauldepping/ranking-forge/worker
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Docker metadata for crawler
        id: meta-crawler
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pauldepping/ranking-forge/crawler
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: backend/
          target: api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=backend-api
          cache-to: type=gha,mode=max,scope=backend-api

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: backend/
          target: worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: |
            type=gha,scope=backend-api
            type=gha,scope=backend-worker
          cache-to: type=gha,mode=max,scope=backend-worker

      - name: Build and push crawler
        uses: docker/build-push-action@v6
        with:
          context: backend/
          target: crawler
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-crawler.outputs.tags }}
          labels: ${{ steps.meta-crawler.outputs.labels }}
          cache-from: |
            type=gha,scope=backend-api
            type=gha,scope=backend-crawler
          cache-to: type=gha,mode=max,scope=backend-crawler

  topology:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - name: Start Postgres
        run: |
          docker run -d --name rf-topology \
            -e POSTGRES_PASSWORD=postgres \
            -p 15432:5432 \
            postgres:18
          until docker exec rf-topology pg_isready -U postgres -q 2>/dev/null; do
            sleep 0.1
          done

      - name: Build api and worker
        working-directory: backend/
        env:
          SQLX_OFFLINE: "true"
        run: cargo build -p api -p worker

      - name: Start api
        shell: bash
        working-directory: backend/
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:15432/postgres
          CORS_ORIGIN: http://localhost
        run: ./target/debug/api > /tmp/api.log 2>&1 &

      - name: Start worker
        shell: bash
        working-directory: backend/
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:15432/postgres
        run: ./target/debug/worker > /tmp/worker.log 2>&1 &

      - name: Run topology tests
        working-directory: backend/
        env:
          API_URL: http://localhost:3000
          SQLX_OFFLINE: "true"
        run: cargo test -p topology --features topology-tests

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== api.log ===" && cat /tmp/api.log || true
          echo "=== worker.log ===" && cat /tmp/worker.log || true

  live-tests:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      STARTGG_API_KEY: ${{ secrets.STARTGG_API_KEY }}
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - name: Run live integration tests
        working-directory: backend/
        run: cargo test -p e2e --features live-tests -- --nocapture

  build-web:
    needs: [test, topology]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata for web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pauldepping/ranking-forge/web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=pr

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: web/
          target: web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
