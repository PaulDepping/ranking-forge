services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: rankingforge
      POSTGRES_PASSWORD: rankingforge
      POSTGRES_DB: rankingforge
    volumes:
      - ./postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankingforge"]
      interval: 5s
      timeout: 5s
      start_interval: 0.1s
      start_period: 10s
      retries: 5

  api:
    build:
      context: ./backend
      target: api
    environment:
      DATABASE_URL: postgres://rankingforge:rankingforge@db:5432/rankingforge
      PORT: 3000
      BIND_ADDR: "0.0.0.0"
      STARTGG_API_KEY: ${STARTGG_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      target: worker
    environment:
      DATABASE_URL: postgres://rankingforge:rankingforge@db:5432/rankingforge
      STARTGG_API_KEY: ${STARTGG_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        INTERNAL_API_URL: http://api:3000
    environment:
      ORIGIN: http://localhost:5173
      PUBLIC_API_URL: http://localhost:3000
    ports:
      - "127.0.0.1:5173:3000"
    depends_on:
      - api

volumes:
  postgres_data:
